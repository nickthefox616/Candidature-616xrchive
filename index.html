<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidature 616xrchive</title>
  <!-- Font Black Chancery -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Chancery&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 Candidature 616xrchive</h1>

    <form id="candidatura-form">
      <div class="form-group">
        <label for="nome">Nome e Cognome:</label>
        <input type="text" id="nome" required>
      </div>

      <div class="form-group">
        <label for="ruolo">Ruolo a cui ti stai candidando:</label>
        <select id="ruolo" required>
          <option value="">-- Seleziona un ruolo --</option>
          <option value="Admin">Admin 🟠</option>
          <option value="Moderatore">Moderatore 🟤</option>
          <option value="Helper">Helper 🟢</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">Recapito e-mail (obbligatorio):</label>
        <input type="email" id="email" required>
        <small>Inserisci un indirizzo email valido (es. esempio@gmail.com).</small>
      </div>

      <!-- Domande 1-10 -->
      <div class="form-group">
        <label for="risposta1">1. Perché vuoi unirti al nostro staff?</label>
        <input type="text" id="risposta1" required>
      </div>

      <div class="form-group">
        <label for="risposta2">2. Quali sono le tue esperienze precedenti in ruoli simili?</label>
        <input type="text" id="risposta2" required>
      </div>

      <div class="form-group">
        <label for="risposta3">3. Come gestiresti un conflitto tra membri dello staff?</label>
        <input type="text" id="risposta3" required>
      </div>

      <div class="form-group">
        <label for="risposta4">4. Quali sono i tuoi punti di forza?</label>
        <input type="text" id="risposta4" required>
      </div>

      <div class="form-group">
        <label for="risposta5">5. Come ti comporteresti di fronte a un utente tossico?</label>
        <input type="text" id="risposta5" required>
      </div>

      <div class="form-group">
        <label for="risposta6">6. Quali sono i tuoi hobby e interessi?</label>
        <input type="text" id="risposta6" required>
      </div>

      <div class="form-group">
        <label for="risposta7">7. Descrivi un situazione in cui hai dimostrato leadership.</label>
        <input type="text" id="risposta7" required>
      </div>

      <div class="form-group">
        <label id="domanda8">8. Domanda generica:</label>
        <input type="text" id="risposta8" required>
      </div>

      <div class="form-group">
        <label for="risposta9">9. Perché dovremmo scegliere te rispetto ad altri candidati?</label>
        <input type="text" id="risposta9" required>
      </div>

      <div class="form-group">
        <label for="risposta10">10. Hai domande per noi?</label>
        <input type="text" id="risposta10" required>
      </div>

      <button type="submit">Invia Candidatura</button>
    </form>
  </div>

  <!-- Sezione per l'admin (solo se sei l'admin) -->
  <div class="admin-container" id="admin-section" style="display: none;">
    <h1>🔑 Pannello Admin - Gestione Candidature</h1>
    <div id="candidature-container"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
