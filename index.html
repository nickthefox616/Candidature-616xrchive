<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidatura Staff</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 Candidatura per Staff</h1>

    <form id="candidatura-form">
      <div class="form-group">
        <label for="nome">Nome e Cognome:</label>
        <input type="text" id="nome" required>
      </div>

      <div class="form-group">
        <label for="ruolo">Ruolo a cui ti stai candidando:</label>
        <input type="text" id="ruolo" required>
      </div>

      <div class="form-group">
        <label for="email">Recapito e-mail (obbligatorio):</label>
        <input type="email" id="email" required>
        <small>Inserisci un indirizzo email valido (es. esempio@gmail.com).</small>
      </div>

      <!-- Domande 1-10 -->
      <div class="form-group">
        <label for="risposta1">1. Domanda 1:</label>
        <input type="text" id="risposta1" required>
      </div>

      <div class="form-group">
        <label for="risposta2">2. Domanda 2:</label>
        <input type="text" id="risposta2" required>
      </div>

      <div class="form-group">
        <label for="risposta3">3. Domanda 3:</label>
        <input type="text" id="risposta3" required>
      </div>

      <div class="form-group">
        <label for="risposta4">4. Domanda 4:</label>
        <input type="text" id="risposta4" required>
      </div>

      <div class="form-group">
        <label for="risposta5">5. Domanda 5:</label>
        <input type="text" id="risposta5" required>
      </div>

      <div class="form-group">
        <label for="risposta6">6. Domanda 6:</label>
        <input type="text" id="risposta6" required>
      </div>

      <div class="form-group">
        <label for="risposta7">7. Domanda 7:</label>
        <input type="text" id="risposta7" required>
      </div>

      <div class="form-group">
        <label for="risposta8">8. Domanda 8:</label>
        <input type="text" id="risposta8" required>
      </div>

      <div class="form-group">
        <label for="risposta9">9. Domanda 9:</label>
        <input type="text" id="risposta9" required>
      </div>

      <div class="form-group">
        <label for="risposta10">10. Domanda 10:</label>
        <input type="text" id="risposta10" required>
      </div>

      <button type="submit">Invia Candidatura</button>
    </form>
  </div>

  <!-- Sezione per l'admin (solo se sei l'admin) -->
  <div class="admin-container" id="admin-section" style="display: none;">
    <h1>🔑 Pannello Admin - Gestione Candidature</h1>
    <div id="candidature-container"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
